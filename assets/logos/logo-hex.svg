<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="hex-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="hex-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <polygon points="100,15 175,55 175,145 100,185 25,145 25,55"
           fill="url(#hex-grad)" stroke="#0D9488" stroke-width="3" stroke-linejoin="round"/>
  <text x="100" y="92" text-anchor="middle"
        font-family="Sora, system-ui, sans-serif" font-size="42" font-weight="800"
        fill="#FFFFFF" letter-spacing="-1">A</text>
  <line x1="60" y1="105" x2="140" y2="105" stroke="#0D9488" stroke-width="2" opacity="0.7">
    <animate attributeName="stroke-dasharray" values="0 80;80 0" dur="2.5s" begin="0s" fill="freeze"/>
  </line>
  <text x="100" y="138" text-anchor="middle"
        font-family="Sora, system-ui, sans-serif" font-size="32" font-weight="800"
        fill="#0D9488" letter-spacing="2">27
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </text>
</svg>

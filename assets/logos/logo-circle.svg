<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <circle cx="100" cy="100" r="78" fill="none" stroke="#E8E4DC" stroke-width="6"/>
  <circle cx="100" cy="100" r="78" fill="none" stroke="#0D9488" stroke-width="6"
          stroke-linecap="round" stroke-dasharray="490"
          stroke-dashoffset="490" transform="rotate(-90 100 100)">
    <animate attributeName="stroke-dashoffset" from="490" to="120"
             dur="2.2s" begin="0s" fill="freeze"/>
  </circle>
  <text x="100" y="92" text-anchor="middle" font-family="Sora, system-ui, sans-serif"
        font-size="22" font-weight="700" fill="#0F172A" letter-spacing="-0.5">annex</text>
  <text x="100" y="130" text-anchor="middle" font-family="Sora, system-ui, sans-serif"
        font-size="44" font-weight="800" fill="#0D9488" letter-spacing="-1">27</text>
  <circle cx="100" cy="22" r="3" fill="#0D9488">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0c0f1a"/>

  <!-- Accent top bar -->
  <rect x="0" y="0" width="1200" height="6" fill="#0D9488"/>

  <!-- Subtle circle decorations -->
  <circle cx="1050" cy="120" r="80" fill="none" stroke="#0D9488" stroke-width="1" opacity="0.2"/>
  <circle cx="1050" cy="120" r="140" fill="none" stroke="#0D9488" stroke-width="1" opacity="0.1"/>
  <circle cx="1050" cy="120" r="200" fill="none" stroke="#0D9488" stroke-width="1" opacity="0.05"/>

  <!-- Logo -->
  <g transform="translate(72, 72)">
    <text x="0" y="30" font-family="Sora, sans-serif" font-size="28" font-weight="700" fill="white" letter-spacing="-0.02em">annex<tspan fill="#14b8a6">27</tspan></text>
  </g>

  <!-- Eyebrow -->
  <g transform="translate(72, 200)">
    <rect x="0" y="-1" width="32" height="2" fill="#14b8a6"/>
    <text x="48" y="6" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#14b8a6" letter-spacing="0.2em">ISO 27001 VOOR HET MKB</text>
  </g>

  <!-- Main headline -->
  <g transform="translate(72, 240)">
    <text x="0" y="64" font-family="Sora, sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-0.035em">Uw weg naar ISO 27001,</text>
    <text x="0" y="148" font-family="Sora, sans-serif" font-size="72" font-weight="800" letter-spacing="-0.035em">
      <tspan fill="#14b8a6">in weken</tspan><tspan fill="white">.</tspan> <tspan fill="#64748b">Niet in maanden.</tspan>
    </text>
  </g>

  <!-- Stats bar -->
  <g transform="translate(72, 510)">
    <text x="0" y="24" font-family="Sora, sans-serif" font-size="28" font-weight="700" fill="white">93</text>
    <text x="0" y="50" font-family="Inter, sans-serif" font-size="14" fill="#94a3b8">Annex A controls</text>

    <line x1="130" y1="8" x2="130" y2="54" stroke="#334155" stroke-width="1"/>

    <text x="155" y="24" font-family="Sora, sans-serif" font-size="28" font-weight="700" fill="white">30 min</text>
    <text x="155" y="50" font-family="Inter, sans-serif" font-size="14" fill="#94a3b8">Self-assessment</text>

    <line x1="335" y1="8" x2="335" y2="54" stroke="#334155" stroke-width="1"/>

    <text x="360" y="24" font-family="Sora, sans-serif" font-size="28" font-weight="700" fill="white">48u</text>
    <text x="360" y="50" font-family="Inter, sans-serif" font-size="14" fill="#94a3b8">Lead Auditor review</text>
  </g>

  <!-- NL & BE badge bottom right -->
  <g transform="translate(1060, 570)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#64748b" text-anchor="end">NEDERLAND &amp; BELGIË</text>
  </g>
</svg>

<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#14b8a6" />
  <script src="/analytics-admin.js"></script>
  <title>Factuur &mdash; Annex27</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js" integrity="sha384-2zrRDgDHSYB/GN3nFW3fsZXoxEhKIr3N2h63Tc6DEOB9JJdFIu8xMJT2Cph/gBil" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #0F172A;
      --ink-2: #475569;
      --muted: #94A3B8;
      --accent: #0D9488;
      --accent-light: #14b8a6;
      --border: #E5E5E5;
    }
    html, body { height: 100%; background: #F4F4F4; font-family: 'Inter', sans-serif; color: var(--ink); }
    .wrap { max-width: 820px; margin: 0 auto; padding: 32px 24px 80px; }

    .toolbar { display: flex; gap: 10px; justify-content: flex-end; margin-bottom: 20px; }
    .toolbar button, .toolbar a {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px; border-radius: 10px;
      background: var(--accent); color: #fff; border: none;
      font-family: inherit; font-weight: 600; font-size: 0.88rem;
      text-decoration: none; cursor: pointer;
    }
    .toolbar .secondary { background: #fff; color: var(--ink); border: 1px solid var(--border); }
    .toolbar button:hover { background: #0F766E; }
    .toolbar svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

    .sheet {
      background: #fff;
      border-radius: 12px;
      padding: 56px 64px;
      box-shadow: 0 4px 24px rgba(15,23,42,0.06);
      position: relative;
      min-height: 273mm;
      display: flex;
      flex-direction: column;
    }
    .sheet::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px;
      background: var(--accent-light);
      border-radius: 12px 12px 0 0;
    }
    .sheet-body { flex: 1; display: flex; flex-direction: column; }
    .items-section { flex: 1; display: flex; flex-direction: column; }
    .head { display: flex; justify-content: space-between; align-items: flex-start; gap: 24px; margin-bottom: 56px; }
    .brand {
      font-family: 'Sora', sans-serif; font-size: 1.6rem; font-weight: 800; letter-spacing: -0.02em;
    }
    .brand span { color: var(--accent-light); }
    .brand-sub { color: var(--muted); font-size: 0.82rem; margin-top: 4px; }
    .doc-title {
      text-align: right;
    }
    .doc-title-eyebrow {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.18em;
      color: var(--accent); text-transform: uppercase; margin-bottom: 4px;
    }
    .doc-title h1 { font-family: 'Sora', sans-serif; font-size: 2rem; font-weight: 800; letter-spacing: -0.03em; }
    .doc-title .nr { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 1rem; color: var(--ink-2); margin-top: 4px; }

    .meta { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-bottom: 36px; padding-bottom: 28px; border-bottom: 1px solid var(--border); }
    .meta-block .label { font-size: 0.66rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .meta-block .name { font-weight: 700; font-size: 0.98rem; color: var(--ink); margin-bottom: 2px; }
    .meta-block .line { font-size: 0.88rem; color: var(--ink-2); line-height: 1.55; }

    table.items {
      width: 100%; border-collapse: collapse; margin-bottom: 20px;
    }
    table.items thead th {
      text-align: left; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--muted); padding-bottom: 10px; border-bottom: 2px solid var(--ink);
    }
    table.items thead th.right { text-align: right; }
    table.items tbody td {
      padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 0.92rem; vertical-align: top;
    }
    table.items tbody td.right { text-align: right; font-variant-numeric: tabular-nums; }
    table.items tbody .desc { color: var(--ink-2); font-size: 0.82rem; margin-top: 4px; }

    .totals { margin-left: auto; width: 280px; margin-top: 12px; }
    .totals-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 0.9rem; color: var(--ink-2); }
    .totals-row.grand {
      margin-top: 8px; padding-top: 12px; border-top: 2px solid var(--ink);
      font-family: 'Sora', sans-serif; font-weight: 800; font-size: 1.1rem; color: var(--ink);
    }

    .deliverables {
      margin-top: 32px; padding: 22px 26px;
      background: #F7FBFB;
      border: 1px solid #D9EEEC;
      border-left: 3px solid var(--accent-light);
      border-radius: 8px;
    }
    .deliverables h3 {
      font-family: 'Sora', sans-serif; font-size: 0.82rem; font-weight: 800;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 14px;
    }
    .deliverables ul { list-style: none; padding: 0; margin: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px 24px; }
    .deliverables li {
      font-size: 0.86rem; color: var(--ink); line-height: 1.5;
      position: relative; padding-left: 22px;
    }
    .deliverables li::before {
      content: ''; position: absolute; left: 0; top: 7px;
      width: 14px; height: 8px;
      border-left: 2px solid var(--accent); border-bottom: 2px solid var(--accent);
      transform: rotate(-45deg);
    }

    .next-steps {
      margin-top: 24px; padding: 18px 22px;
      background: #FAFBFC;
      border: 1px solid var(--border);
      border-radius: 8px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 16px; align-items: start;
    }
    .next-steps-icon {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--accent); color: white;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Sora', sans-serif; font-weight: 800; font-size: 1rem;
      flex-shrink: 0;
    }
    .next-steps h4 {
      font-family: 'Sora', sans-serif; font-size: 0.88rem; font-weight: 800;
      color: var(--ink); margin-bottom: 8px;
    }
    .next-steps ol { padding-left: 18px; margin: 0; font-size: 0.82rem; color: var(--ink-2); line-height: 1.7; }
    .next-steps ol li { padding: 2px 0; }

    .thanks {
      margin-top: 28px; padding: 16px 22px;
      font-size: 0.86rem; color: var(--ink-2); line-height: 1.6;
      border-left: 2px solid var(--accent-light);
      font-style: italic;
    }
    .thanks strong { color: var(--ink); font-style: normal; font-weight: 700; }

    .footer {
      margin-top: auto; padding-top: 28px; border-top: 1px solid var(--border);
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; font-size: 0.78rem; color: var(--ink-2);
    }
    .footer .label { font-size: 0.64rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
    .legal-line {
      margin-top: 24px; padding-top: 14px; border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center; gap: 16px;
      font-size: 0.7rem; color: var(--muted);
    }
    .legal-line a { color: var(--muted); text-decoration: underline; }
    .legal-line a:hover { color: var(--ink-2); }

    .loading, .error {
      text-align: center; padding: 60px 20px; color: var(--muted); font-size: 0.92rem;
    }
    .error { color: #DC2626; }

    @media print {
      html, body { background: #fff; }
      .toolbar { display: none !important; }
      .wrap { padding: 0; max-width: none; }
      .sheet { box-shadow: none; border-radius: 0; padding: 24px 40px; }
      .sheet::before { display: none; }
      @page { margin: 12mm; size: A4; }
    }
    @media (max-width: 640px) {
      .sheet { padding: 32px 22px; min-height: auto; }
      .meta { grid-template-columns: 1fr; gap: 20px; }
      .footer { grid-template-columns: 1fr; }
      .doc-title h1 { font-size: 1.6rem; }
      .deliverables ul { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="toolbar">
    <a href="/dashboard" class="secondary">
      <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Terug
    </a>
    <button onclick="window.print()">
      <svg viewBox="0 0 24 24"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/></svg>
      Download PDF
    </button>
  </div>
  <div class="sheet" id="sheet">
    <div class="loading">Factuur laden...</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://tvqhxhoohzdzekcfzjuv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_-a0bntwsGr8mR9xROgJTzQ_Gylt8ZSo';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const PRODUCT_LABELS = {
  gap: 'Gap-analyse ISO 27001',
  beleid: 'Beleidspakket ISO 27001',
  readiness: 'Readiness Platform',
  preaudit: 'Pre-audit Review',
  nis2: 'NIS2 Readiness Check',
  custom: 'Aangepast'
};
const PRODUCT_DESCR = {
  gap: 'Volledige gap-analyse: alle 93 Annex A controls met verplichte bewijsvoering en persoonlijke review door een ISO 27001 Lead Auditor.',
  beleid: 'ISO 27001 beleidsdocumenten en werkinstructies, sector-specifiek aangepast en goedgekeurd door Lead Auditor.',
  readiness: 'Readiness Platform abonnement per maand, incl. documenten, checklists, evidence-upload en real-time compliance-score.',
  preaudit: 'Persoonlijke 1-op-1 pre-audit review door Lead Auditor, ter voorbereiding op externe certificering.',
  nis2: 'NIS2 Readiness Check: alle 10 Art. 21 maatregelen, meldingsplicht-check en bestuursaansprakelijkheid assessment.',
  custom: ''
};
const PRODUCT_DELIVERABLES = {
  gap: [
    'Volledig rapport (PDF) + klantportaal-toegang',
    'Gap-analyse op alle 93 Annex A controls',
    'Prioriteitslijst met concrete remediatie-stappen',
    'Persoonlijke review door ISO 27001 Lead Auditor',
    'Oplevering binnen 48u na evidence upload'
  ],
  beleid: [
    '27 basispakket beleidsdocumenten + werkinstructies',
    'Sector-specifieke aanpassingen inbegrepen',
    'Word + PDF versies, direct bruikbaar',
    'Goedkeuring door ISO 27001 Lead Auditor',
    '1 revisieronde inbegrepen'
  ],
  readiness: [
    'Maandelijkse toegang tot Readiness Platform',
    'Documentenbibliotheek + evidence upload',
    'Live compliance-score + dashboard',
    'Onbeperkt wijzigingen + updates',
    'Direct chat-support met Lead Auditor'
  ],
  preaudit: [
    'Persoonlijke 1-op-1 pre-audit sessie (2u)',
    'Volledige walkthrough van alle Annex A controls',
    'Specifieke aandachtspunten voor certificerende instantie',
    'Eindrapport met go/no-go advies',
    'Oplevering binnen 1 week na sessie'
  ],
  nis2: [
    'Alle 10 Art. 21 NIS2-maatregelen beoordeeld',
    'Meldingsplicht-check (24u / 72u / 1 maand)',
    'Bestuursaansprakelijkheid assessment',
    'Concrete gap-lijst met prioriteiten',
    'Voldoet aan NIS2-transpositie NL/BE'
  ],
  custom: []
};

function esc(s) { return String(s ?? '').replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }
function fmt(n) { return '\u20AC ' + Number(n).toLocaleString('nl-NL', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

(async function () {
  const sheet = document.getElementById('sheet');
  const params = new URLSearchParams(window.location.search);
  const nr = params.get('nr');
  if (!nr) { sheet.innerHTML = '<div class="error">Geen factuurnummer in de URL.</div>'; return; }

  // Ensure logged in (required for RLS)
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    sheet.innerHTML = '<div class="error">Log in om deze factuur te bekijken. <a href="/portal" style="color:#0D9488;">Klik hier om in te loggen</a> en open dan deze pagina opnieuw.</div>';
    return;
  }

  const { data, error } = await sb.from('invoices').select('*').eq('invoice_number', nr).maybeSingle();
  if (error || !data) {
    sheet.innerHTML = '<div class="error">Factuur niet gevonden of geen toegang.</div>';
    return;
  }

  const issued = new Date(data.issued_at);
  const dueDate = new Date(issued.getTime() + 14 * 24 * 3600 * 1000);
  const issuedFmt = issued.toLocaleDateString('nl-NL', { day: '2-digit', month: 'long', year: 'numeric' });
  const dueFmt = dueDate.toLocaleDateString('nl-NL', { day: '2-digit', month: 'long', year: 'numeric' });

  const productLabel = PRODUCT_LABELS[data.product] || data.product;
  const productDescr = data.omschrijving || PRODUCT_DESCR[data.product] || '';

  document.title = 'Factuur ' + data.invoice_number + ' — Annex27';

  const deliverables = PRODUCT_DELIVERABLES[data.product] || [];

  sheet.innerHTML = `
    <div class="head">
      <div>
        <div class="brand">annex<span>27</span></div>
        <div class="brand-sub">ISO 27001 compliance voor het MKB</div>
      </div>
      <div class="doc-title">
        <div class="doc-title-eyebrow">Factuur</div>
        <h1>${esc(data.invoice_number)}</h1>
        <div class="nr">Datum: ${esc(issuedFmt)}</div>
      </div>
    </div>

    <div class="sheet-body">
      <div class="meta">
        <div class="meta-block">
          <div class="label">Van</div>
          <div class="name">Annex27</div>
          <div class="line">
            info@annex27.nl<br/>
            KBO 1006.203.170<br/>
            IBAN: BE28 7310 7616 8920<br/>
            ${data.btw_regime === 'none' ? 'Kleine onderneming &mdash; vrijgesteld van BTW (Art. 56bis WBTW)' : 'BTW: BE ' + (data.seller_btw || 'in aanvraag')}
          </div>
        </div>
        <div class="meta-block">
          <div class="label">Aan</div>
          <div class="name">${esc(data.bedrijf)}</div>
          <div class="line">
            ${esc(data.naam)}<br/>
            ${data.adres ? esc(data.adres) + '<br/>' : ''}
            ${esc(data.email)}<br/>
            ${data.btw_nummer ? 'BTW: ' + esc(data.btw_nummer) : ''}
          </div>
        </div>
      </div>

      <div class="items-section">
        <table class="items">
          <thead>
            <tr>
              <th>Omschrijving</th>
              <th class="right">Bedrag</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>
                <strong>${esc(productLabel)}</strong>
                ${productDescr ? '<div class="desc">' + esc(productDescr) + '</div>' : ''}
              </td>
              <td class="right">${fmt(data.subtotal)}</td>
            </tr>
          </tbody>
        </table>

        <div class="totals">
          ${data.btw_regime === 'none' ? `
            <div class="totals-row grand"><span>Totaal</span><span>${fmt(data.total)}</span></div>
            <div style="margin-top:10px;font-size:0.76rem;color:var(--muted);text-align:right;max-width:100%;line-height:1.5;">
              Geen BTW van toepassing &mdash; Annex27 is kleine onderneming (BTW-vrijgesteld, Art. 56bis WBTW) zolang BTW-nummer in aanvraag is.
            </div>
          ` : data.btw_regime === 'reverse_charge' ? `
            <div class="totals-row"><span>Subtotaal</span><span>${fmt(data.subtotal)}</span></div>
            <div class="totals-row"><span>BTW verlegd naar afnemer</span><span>&mdash;</span></div>
            <div class="totals-row grand"><span>Totaal</span><span>${fmt(data.total)}</span></div>
            <div style="margin-top:10px;font-size:0.76rem;color:var(--muted);text-align:right;line-height:1.5;">
              BTW verlegd &mdash; art. 196 BTW-richtlijn. BTW-aangifte door afnemer.
            </div>
          ` : `
            <div class="totals-row"><span>Subtotaal</span><span>${fmt(data.subtotal)}</span></div>
            <div class="totals-row"><span>BTW (21%)</span><span>${fmt(data.btw_amount)}</span></div>
            <div class="totals-row grand"><span>Totaal</span><span>${fmt(data.total)}</span></div>
          `}
        </div>

        <div style="clear:both;"></div>

        ${deliverables.length ? `
        <div class="deliverables">
          <h3>Wat u ontvangt</h3>
          <ul>
            ${deliverables.map(d => '<li>' + esc(d) + '</li>').join('')}
          </ul>
        </div>` : ''}

        <div class="next-steps">
          <div class="next-steps-icon">&rarr;</div>
          <div>
            <h4>Volgende stappen</h4>
            <ol>
              <li>U ontvangt binnen enkele minuten een bevestigingsmail.</li>
              <li>Binnen 24 uur sturen wij de logingegevens voor uw klantportaal.</li>
              <li>Log in op <a href="https://annex27.nl/portal" style="color:var(--accent);">annex27.nl/portal</a> en start direct met uw traject.</li>
              <li>Bij vragen: antwoord op deze e-mail of mail naar info@annex27.nl &mdash; persoonlijk contact met uw Lead Auditor.</li>
            </ol>
          </div>
        </div>

        <div class="thanks">
          <strong>Dank voor uw vertrouwen in Annex27.</strong> Wij kijken ernaar uit uw organisatie te begeleiden naar ISO 27001 compliance &mdash; zonder overbodige complexiteit, met persoonlijke expertise.
          <br/><br/>
          &mdash; Raoul Haas, ISO 27001 Lead Auditor
        </div>
      </div>
    </div>

    <div class="footer">
      <div>
        <div class="label">Betaalwijze</div>
        ${data.status === 'paid'
          ? '<strong style="color:#10b981;">Betaald</strong><br/>via Mollie'
          : 'Open. Te voldoen via Mollie of overschrijving:<br/><strong>BE28 7310 7616 8920</strong><br/><span style="color:var(--muted);">o.v.v. ' + esc(data.invoice_number || '') + '</span>'}
      </div>
      <div>
        <div class="label">Vervaldatum</div>
        ${esc(dueFmt)}
      </div>
      <div>
        <div class="label">Vragen?</div>
        info@annex27.nl<br/>
        <span style="color:var(--muted);">Reactie binnen 24u</span>
      </div>
    </div>

    <div class="legal-line">
      <span>Annex27 &middot; KBO 1006.203.170 &middot; annex27.nl</span>
      <span><a href="https://annex27.nl/trust" target="_blank">Trust &amp; Security</a> &middot; <a href="https://annex27.nl/faq" target="_blank">Voorwaarden</a></span>
    </div>
  `;

  // Auto-open print dialog if ?print=1
  if (params.get('print') === '1') setTimeout(() => window.print(), 400);
})();
</script>
</body>
</html>

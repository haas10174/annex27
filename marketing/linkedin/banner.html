<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;700;800&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1128px;height:191px;overflow:hidden;}
  .banner{
    width:1128px;height:191px;position:relative;
    background:linear-gradient(135deg,#0F766E 0%,#0D9488 55%,#14B8A6 100%);
    font-family:'Sora',system-ui,-apple-system,Segoe UI,sans-serif;color:#fff;
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  }
  .deco{position:absolute;inset:0;overflow:hidden;}
  .deco .c1{position:absolute;width:260px;height:260px;border-radius:50%;background:rgba(255,255,255,.06);right:-50px;top:-90px;}
  .deco .c2{position:absolute;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.06);right:30px;bottom:-70px;}
  .wm{font-weight:800;font-size:24px;letter-spacing:-.5px;margin-bottom:7px;position:relative;}
  .wm span{color:#CCFBF1;}
  .h{font-weight:800;font-size:31px;letter-spacing:-.6px;position:relative;}
  .s{font-weight:500;font-size:17px;color:#EAFBF7;opacity:.92;margin-top:10px;position:relative;}
</style>
</head>
<body>
  <div class="banner">
    <div class="deco"><div class="c1"></div><div class="c2"></div></div>
    <div class="wm">annex<span>27</span></div>
    <div class="h">ISO 27001, NIS2 en NEN 7510 voor het MKB</div>
    <div class="s">Eenmalig geregeld, met een Lead Auditor &middot; annex27.nl</div>
  </div>
</body>
</html>
